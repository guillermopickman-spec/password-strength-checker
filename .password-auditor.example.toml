# =============================================================================
# Password Strength Auditor - TOML Configuration Example
# =============================================================================
# Copy this file to .password-auditor.toml and customize as needed
# Alternative: Add [tool.password-auditor] section to pyproject.toml
# =============================================================================

# -----------------------------------------------------------------------------
# Policy Profile
# -----------------------------------------------------------------------------
# Predefined profiles: default, developer, soc2-strict, nist-moderate, pci-dss, enterprise
profile = "default"

# -----------------------------------------------------------------------------
# Password Policy Configuration
# -----------------------------------------------------------------------------
[password_policy]
min_password_length = 12
default_password_length = 16
default_passphrase_words = 4
require_uppercase = true
require_lowercase = true
require_digits = true
require_special = true

# -----------------------------------------------------------------------------
# Entropy Thresholds (in bits)
# -----------------------------------------------------------------------------
[entropy_thresholds]
very_weak = 28
weak = 36
moderate = 60
strong = 80

# -----------------------------------------------------------------------------
# HaveIBeenPwned API Configuration
# -----------------------------------------------------------------------------
[hibp]
api_timeout = 5
retry_attempts = 3
user_agent = "PasswordStrengthChecker-Project"
base_url = "https://api.pwnedpasswords.com"
max_concurrent = 10
call_delay = 0.1

# -----------------------------------------------------------------------------
# Logging Configuration
# -----------------------------------------------------------------------------
[logging]
level = "INFO"
format = "simple"
# file = "/var/log/password-auditor.log"
# rotation = "daily"

# -----------------------------------------------------------------------------
# Character Set Configuration
# -----------------------------------------------------------------------------
[character_sets]
special_chars = "!@#$%^&*"
ambiguous_chars = "0O1lI"

# -----------------------------------------------------------------------------
# Security Settings
# -----------------------------------------------------------------------------
[security]
secure_memory_wipe = true
disable_password_history = false

# -----------------------------------------------------------------------------
# Application Settings
# -----------------------------------------------------------------------------
[application]
quiet_mode = false
no_color = false
progress_bars = true

# -----------------------------------------------------------------------------
# Custom Settings
# -----------------------------------------------------------------------------
[custom]
# organization = "My Company"
# department = "Security Team"