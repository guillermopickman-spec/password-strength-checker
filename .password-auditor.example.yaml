# =============================================================================
# Password Strength Auditor - YAML Configuration Example
# =============================================================================
# Copy this file to .password-auditor.yaml and customize as needed
# Place in: current directory, ~/.config/password-auditor/, or /etc/password-auditor/
# =============================================================================

# -----------------------------------------------------------------------------
# Policy Profile
# -----------------------------------------------------------------------------
# Predefined profiles: default, developer, soc2-strict, nist-moderate, pci-dss, enterprise
# Profiles set sensible defaults for different compliance requirements
profile: default

# -----------------------------------------------------------------------------
# Password Policy Configuration
# -----------------------------------------------------------------------------
password_policy:
  min_password_length: 12              # Minimum required password length
  default_password_length: 16          # Default for generated passwords
  default_passphrase_words: 4          # Default word count for passphrases
  require_uppercase: true              # Require A-Z characters
  require_lowercase: true              # Require a-z characters
  require_digits: true                 # Require 0-9 characters
  require_special: true                # Require special characters

# -----------------------------------------------------------------------------
# Entropy Thresholds (in bits)
# -----------------------------------------------------------------------------
# These define the boundaries between strength ratings
entropy_thresholds:
  very_weak: 28                        # Below this = Very Weak
  weak: 36                             # Below this = Weak
  moderate: 60                         # Below this = Moderate
  strong: 80                           # Below this = Strong, above = Very Strong

# -----------------------------------------------------------------------------
# HaveIBeenPwned API Configuration
# -----------------------------------------------------------------------------
hibp:
  api_timeout: 5                       # API request timeout (seconds)
  retry_attempts: 3                    # Number of retry attempts
  user_agent: "PasswordStrengthChecker-Project"
  base_url: "https://api.pwnedpasswords.com"
  max_concurrent: 10                   # Max concurrent API calls (batch mode)
  call_delay: 0.1                      # Delay between API calls (seconds)

# -----------------------------------------------------------------------------
# Logging Configuration
# -----------------------------------------------------------------------------
logging:
  level: INFO                          # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: simple                       # simple or json
  file: null                           # Log file path (null = stdout)
  rotation: null                       # daily, weekly, monthly (null = no rotation)

# -----------------------------------------------------------------------------
# Character Set Configuration
# -----------------------------------------------------------------------------
character_sets:
  special_chars: "!@#$%^&*"           # Special characters for generation
  ambiguous_chars: "0O1lI"            # Characters to exclude when avoid_ambiguous=True

# -----------------------------------------------------------------------------
# Security Settings
# -----------------------------------------------------------------------------
security:
  secure_memory_wipe: true             # Attempt secure memory clearing
  disable_password_history: false      # For compliance environments

# -----------------------------------------------------------------------------
# Application Settings
# -----------------------------------------------------------------------------
application:
  quiet_mode: false                    # Minimal output
  no_color: false                      # Disable colored output
  progress_bars: true                  # Show progress bars in batch mode

# -----------------------------------------------------------------------------
# Custom Settings
# -----------------------------------------------------------------------------
# Add any custom key-value pairs here for your own use
custom:
  # organization: "My Company"
  # department: "Security Team"